<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura G1 — UI/UX · Debayan Mukherjee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,100..1000,96,468,79,-203,738,514,712&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
/* ── TOKENS ──────────────────────────────────── */
:root{
  --bg:#090d18;--surface:#0e1423;
  --stroke:rgba(255,255,255,.09);
  --text:#f0ece4;--muted:rgba(240,236,228,.52);
  --moss:#697355;--tangerine:#ef6d45;--vapor:#6bc7ff;
  --accent:#9dc3ff;
  --plate-fill:rgba(238,242,255,.64);--plate-stroke:rgba(255,255,255,.55);
  --mood-accent:#8ce0bc;--vent-ratio:.62;
  --f:'Space Grotesk',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --ease-out:cubic-bezier(.22,1,.36,1);
  --ease-snap:cubic-bezier(.34,1.56,.64,1);
  --headband-glow:rgba(157,195,255,.18);
}
body[data-plate="coral"]{--plate-fill:#ef6d45;--plate-stroke:rgba(255,232,225,.7);--accent:#ff9b78;--headband-glow:rgba(239,109,69,.18)}
body[data-plate="graffiti"]{--plate-fill:#8d8f94;--plate-stroke:rgba(245,245,247,.58);--accent:#d5d8e0;--headband-glow:rgba(208,214,234,.18)}
body[data-plate="clear"]{--plate-fill:rgba(223,236,242,.18);--plate-stroke:rgba(255,255,255,.35);--accent:#8ad8ff;--headband-glow:rgba(108,205,255,.18)}
body[data-plate="frost"]{--plate-fill:rgba(238,242,255,.64);--plate-stroke:rgba(255,255,255,.55);--accent:#a3c2ff;--headband-glow:rgba(163,194,255,.18)}
body[data-mood="amped"]{--mood-accent:#ff9b78}
body[data-mood="grounded"]{--mood-accent:#8ce0bc}
body[data-mood="reset"]{--mood-accent:#9fd7ff}
body[data-cable="false"] .cable-path{opacity:0;transition:opacity .36s ease}
body[data-cable="true"] .cable-path{opacity:1;transition:opacity .36s ease}
body[data-plate="graffiti"] .plate-graffiti{display:block}
.plate-graffiti{display:none}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--f);overflow-x:hidden;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}
button,input{font:inherit;cursor:pointer}
a{color:inherit;text-decoration:none}

/* ── AMBIENT ─────────────────────────────────── */
.amb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.15;pointer-events:none;z-index:0}
.amb.a{top:-10vw;left:-10vw;width:38vw;height:38vw;background:rgba(107,199,255,.42)}
.amb.b{top:34vh;right:-14vw;width:38vw;height:38vw;background:rgba(239,109,69,.36)}
.amb.c{bottom:-12vw;left:30vw;width:38vw;height:38vw;background:rgba(122,208,173,.32)}

/* ── NAV ─────────────────────────────────────── */
.top-nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:52px;display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;
  background:rgba(9,13,24,.92);border-bottom:1px solid var(--stroke);
  backdrop-filter:blur(16px);
}
.nav-brand{display:flex;align-items:center;gap:12px;font-size:15px;font-weight:700;letter-spacing:-.04em}
.nav-brand a{color:var(--muted);font-size:12px;font-family:var(--mono);letter-spacing:.06em;transition:color .18s}
.nav-brand a:hover{color:var(--text)}
.nav-sep{color:rgba(255,255,255,.18);font-size:18px;line-height:1}
.nav-screens{display:flex;gap:0}
.ns-btn{
  padding:0 20px;height:52px;background:transparent;
  color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  border:none;border-right:1px solid var(--stroke);border-bottom:2px solid transparent;
  transition:color .18s,background .18s,border-color .18s;
}
.ns-btn:first-of-type{border-left:1px solid var(--stroke)}
.ns-btn.active{color:var(--text);background:rgba(255,255,255,.06);border-bottom-color:var(--accent)}
.ns-btn:hover{color:var(--text)}
.nav-meta{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em}

.app{padding-top:52px;min-height:100vh;position:relative;z-index:1}

/* ── SCREEN FADE ─────────────────────────────── */
.sf{animation:sf .25s ease}
@keyframes sf{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* ── DISCOVER ────────────────────────────────── */
.disc{display:grid}
.hero-split{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--stroke)}
.hero-left{
  padding:64px 48px;border-right:1px solid var(--stroke);
  display:grid;align-content:space-between;gap:0;
}
.eyebrow-tag{
  font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--accent);margin-bottom:32px;
  display:flex;align-items:center;gap:12px;
}
.eyebrow-tag::before{content:'';width:32px;height:1px;background:var(--accent)}
.h1{
  font-size:clamp(56px,7vw,96px);font-weight:700;line-height:.9;
  letter-spacing:-.07em;margin-bottom:24px;
}
.lede{font-size:17px;line-height:1.7;color:var(--muted);max-width:52ch;margin-bottom:36px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:36px}
.chip{
  padding:8px 14px;border:1px solid var(--stroke);background:rgba(255,255,255,.04);
  font-size:12px;font-family:var(--mono);letter-spacing:.06em;color:var(--muted);
}
.chip strong{color:var(--text)}
.cta-row{display:flex;gap:10px}
.btn-p{
  padding:13px 24px;background:var(--text);color:#090d18;
  font-weight:700;font-size:14px;letter-spacing:-.02em;
  border:none;transition:opacity .18s,transform .18s;
}
.btn-p:hover{opacity:.88;transform:translateY(-1px)}
.btn-s{
  padding:13px 24px;background:transparent;color:var(--text);
  border:1px solid var(--stroke);font-size:14px;letter-spacing:-.02em;
  transition:background .18s;
}
.btn-s:hover{background:rgba(255,255,255,.07)}

.hero-right{display:grid;grid-template-rows:1fr auto}
.hero-img{position:relative;overflow:hidden;min-height:520px}
.hero-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(1.1);transition:transform 8s ease}
.hero-img:hover img{transform:scale(1.04)}
.hero-img::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 60%,rgba(9,13,24,.9))}
.hero-img-cap{position:absolute;bottom:18px;left:18px;z-index:2;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,236,228,.55)}
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--stroke)}
.stat{padding:20px 24px;border-right:1px solid var(--stroke)}
.stat:last-child{border-right:none}
.stat-v{font-size:32px;font-weight:700;letter-spacing:-.05em;margin-bottom:4px}
.stat-k{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}

.disc-grid{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--stroke)}
.dcell{padding:36px 32px;border-right:1px solid var(--stroke)}
.dcell:last-child{border-right:none}
.dcell-n{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.1em;margin-bottom:14px}
.dcell-h{font-size:20px;font-weight:700;letter-spacing:-.04em;margin-bottom:9px}
.dcell-p{font-size:14px;line-height:1.7;color:var(--muted)}

.lb-strip{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--stroke)}
.lb-cell{position:relative;overflow:hidden;height:280px;border-right:1px solid var(--stroke)}
.lb-cell:last-child{border-right:none}
.lb-cell img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease-out)}
.lb-cell:hover img{transform:scale(1.06)}
.lb-cell::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(9,13,24,.9))}
.lb-lbl{position:absolute;bottom:14px;left:16px;z-index:1;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,236,228,.65)}

/* ── SUB NAV ─────────────────────────────────── */
.sub-nav{
  display:flex;align-items:center;gap:0;
  height:44px;border-bottom:1px solid var(--stroke);
  padding:0 32px;background:rgba(14,20,35,.6);
}
.sub-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-right:24px}
.sub-tab{
  padding:0 22px;height:44px;background:transparent;color:var(--muted);
  font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  border:none;border-right:1px solid var(--stroke);border-bottom:2px solid transparent;
  transition:color .18s,background .18s,border-color .18s;
}
.sub-tab:first-of-type{border-left:1px solid var(--stroke)}
.sub-tab.on{color:var(--text);background:rgba(255,255,255,.06);border-bottom-color:var(--accent)}
.sub-tab:hover{color:var(--text)}

/* ── DESKTOP SCREENS ─────────────────────────── */

/* Home screen */
.ds-home{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 52px - 44px)}
.ds-home-left{position:relative;overflow:hidden;border-right:1px solid var(--stroke)}
.ds-home-left img{width:100%;height:100%;object-fit:cover}
.ds-home-left::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(9,13,24,.65),transparent 60%)}
.ds-hl-copy{position:absolute;bottom:40px;left:40px;z-index:1}
.ds-hl-copy h2{font-size:clamp(38px,4vw,64px);font-weight:700;letter-spacing:-.07em;line-height:.9;margin-bottom:14px}
.ds-home-right{padding:40px;display:grid;align-content:start;gap:20px}
.ds-grid-2{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--stroke)}
.ds-card{
  padding:26px 22px;border-right:1px solid var(--stroke);border-bottom:1px solid var(--stroke);
}
.ds-card:nth-child(2n){border-right:none}
.ds-card:nth-last-child(-n+2){border-bottom:none}
.ds-card-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.ds-card h4{font-size:16px;font-weight:700;letter-spacing:-.04em;margin-bottom:7px}
.ds-card p{font-size:13px;line-height:1.65;color:var(--muted)}
.ds-quote{padding:22px;border:1px solid var(--stroke);background:rgba(255,255,255,.025)}
.ds-quote p{font-size:21px;font-weight:700;letter-spacing:-.05em;line-height:1.2}
.ds-quote span{display:block;font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:10px;letter-spacing:.04em}

/* Configure screen */
.ds-configure{display:grid;grid-template-columns:1fr 380px;min-height:calc(100vh - 52px - 44px)}
.hstage{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px;position:relative;overflow:hidden;border-right:1px solid var(--stroke);
}
.hglow{
  position:absolute;width:70%;aspect-ratio:1;border-radius:50%;
  background:radial-gradient(circle,var(--headband-glow),transparent 66%);
  filter:blur(50px);pointer-events:none;
  transition:background 800ms ease;
}
/* ── EXACT ORIGINAL SVG STYLES ──────────── */
.headphone-svg{
  width:min(100%,480px);
  filter:drop-shadow(0 36px 72px rgba(0,0,0,.48));
  animation:floatHero 6s var(--ease-out) infinite;
  position:relative;z-index:1;
}
.cable-path{stroke-dasharray:12 6;animation:cableMove 1.6s linear infinite}
body[data-detox="true"] .headphone-svg{filter:drop-shadow(0 36px 72px rgba(0,0,0,.48)) saturate(.7)}
.soundwave-ring{animation:echo 2.4s ease-in-out infinite}
.soundwave-ring:nth-child(2){animation-delay:.6s}
.soundwave-ring:nth-child(3){animation-delay:.3s}
.soundwave-ring:nth-child(4){animation-delay:.9s}
/* ──────────────────────────────────────── */
.vent-info-box{
  margin-top:22px;width:100%;max-width:440px;
  padding:16px 20px;border:1px solid var(--stroke);background:rgba(255,255,255,.03);
}
.vi-pill{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.vi-head{font-size:16px;font-weight:700;letter-spacing:-.04em;margin-bottom:4px}
.vi-body{font-size:13px;color:var(--muted);line-height:1.6}

.ctrl-dock{
  border-left:1px solid var(--stroke);display:grid;align-content:start;
  overflow-y:auto;max-height:calc(100vh - 52px - 44px);
}
.cg{padding:18px 22px;border-bottom:1px solid var(--stroke)}
.cg:last-child{border-bottom:none}
.cg-lbl{
  font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;
  display:flex;justify-content:space-between;
}
.cg-lbl span:last-child{color:var(--text);text-transform:capitalize}
.sw-row{display:flex;gap:10px;flex-wrap:wrap}
.swatch{
  width:38px;height:38px;border:2px solid transparent;
  transition:transform .18s var(--ease-snap),border-color .18s ease;
}
.swatch:hover{transform:scale(1.12)}
.swatch.active{border-color:rgba(255,255,255,.7);transform:scale(1.12)}
.swatch[data-plate="frost"]{background:linear-gradient(135deg,rgba(255,255,255,.7),rgba(205,218,255,.45))}
.swatch[data-plate="coral"]{background:linear-gradient(135deg,#ff926f,#ef6d45)}
.swatch[data-plate="graffiti"]{background:linear-gradient(135deg,#c2c5cc,#8d8f94)}
.swatch[data-plate="clear"]{background:linear-gradient(135deg,rgba(200,220,240,.45),rgba(180,205,225,.2));outline:1px solid rgba(255,255,255,.2)}
input[type=range]{
  width:100%;-webkit-appearance:none;height:3px;
  background:rgba(255,255,255,.12);cursor:pointer;outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;
  background:#fff;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
  transition:transform .18s var(--ease-snap);
}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.28)}
.gauge-track{height:3px;background:rgba(255,255,255,.1);margin-top:8px;overflow:hidden}
.gauge-fill{height:100%;background:var(--accent);transition:width .25s ease}
.helper-txt{font-size:12px;color:var(--muted);margin-top:7px;line-height:1.5}

.toggle-row{display:flex;justify-content:space-between;align-items:center;gap:12px}
.tinfo{display:grid;gap:3px}
.tinfo span{font-size:14px;font-weight:500}
.tinfo small{font-size:12px;color:var(--muted)}
.sw-toggle{
  position:relative;width:46px;height:26px;flex-shrink:0;
  background:rgba(255,255,255,.1);border:1px solid var(--stroke);
  cursor:pointer;transition:background .2s,border-color .2s;
}
.sw-toggle.on{background:rgba(163,194,255,.4);border-color:rgba(163,194,255,.36)}
.sw-toggle::before{
  content:'';position:absolute;top:3px;left:3px;
  width:18px;height:18px;background:#fff;
  transition:transform .22s var(--ease-snap);
  box-shadow:0 2px 6px rgba(0,0,0,.28);
}
.sw-toggle.on::before{transform:translateX(20px)}

.mood-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.mood-btn{
  padding:13px 8px;
  background:rgba(255,255,255,.04);border:1px solid var(--stroke);
  color:var(--muted);font-size:13px;font-weight:600;letter-spacing:-.02em;
  transition:background .18s,color .18s,border-color .18s;
}
.mood-btn.active{background:rgba(157,195,255,.14);border-color:rgba(157,195,255,.36);color:var(--accent)}
.mood-btn:hover{background:rgba(255,255,255,.08);color:var(--text)}

.avatar-row{display:flex;gap:8px;margin-bottom:8px}
.ava{
  width:32px;height:32px;
  background:rgba(255,255,255,.08);border:1px solid var(--stroke);
  position:relative;overflow:hidden;
}
.ava::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 40%,rgba(255,255,255,.3),transparent 60%)}
.gpulse{position:absolute;inset:0;background:rgba(107,199,255,.2);transform:scale(0);opacity:0}
.ghost-active .gpulse{animation:ping .98s ease-out infinite}
.ghost-active .ava:nth-child(2) .gpulse{animation-delay:.32s}
.ghost-active .ava:nth-child(3) .gpulse{animation-delay:.64s}
.ghost-lbl{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.07em;margin-bottom:10px}
.ghost-btn{
  width:100%;padding:15px 18px;
  background:rgba(255,255,255,.05);border:1px solid var(--stroke);
  color:var(--text);font-size:14px;font-weight:700;letter-spacing:-.03em;
  position:relative;overflow:hidden;
  transition:background .18s,border-color .18s,color .18s;
}
.ghost-btn::after{
  content:'';position:absolute;inset:1px;
  background:linear-gradient(120deg,transparent 20%,rgba(255,255,255,.44) 50%,transparent 80%);
  transform:translateX(-120%);pointer-events:none;
}
.ghost-btn:hover::after{animation:shimmer 800ms linear 1}
.ghost-btn.active{background:rgba(107,199,255,.16);border-color:rgba(107,199,255,.4);color:var(--vapor)}

.motion-spec{display:grid;border:1px solid var(--stroke);margin-top:4px}
.mrow{display:grid;grid-template-columns:72px 1fr;border-bottom:1px solid var(--stroke)}
.mrow:last-child{border-bottom:none}
.mtime{
  padding:13px;border-right:1px solid var(--stroke);
  font-family:var(--mono);font-size:16px;font-weight:500;letter-spacing:-.04em;
  color:var(--accent);display:grid;place-items:center;
}
.mdetail{padding:13px}
.mdetail strong{font-size:13px;font-weight:700;letter-spacing:-.03em;display:block;margin-bottom:3px}
.mdetail p{font-size:12px;color:var(--muted);line-height:1.5}

/* Gallery screen */
.ds-gallery{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 52px - 44px)}
.gal-left{border-right:1px solid var(--stroke);display:grid;grid-template-rows:auto 1fr}
.gal-hd{padding:32px;border-bottom:1px solid var(--stroke)}
.gal-hd h3{font-size:30px;font-weight:700;letter-spacing:-.06em;margin-bottom:8px;line-height:1}
.gal-hd p{font-size:14px;color:var(--muted);line-height:1.7}
.gal-img{position:relative;overflow:hidden}
.gal-img img{width:100%;height:100%;object-fit:cover;object-position:center}
.gal-right{display:grid;grid-template-rows:1fr 200px}
.gal-top{position:relative;overflow:hidden;border-bottom:1px solid var(--stroke)}
.gal-top img{width:100%;height:100%;object-fit:cover;object-position:50% 30%}
.gal-top-cap{
  position:absolute;bottom:0;left:0;right:0;padding:16px;z-index:1;
  background:linear-gradient(180deg,transparent,rgba(9,13,24,.85));
  font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(240,236,228,.65);
}
.gal-bottom{display:grid;grid-template-columns:1fr 1fr}
.gmini{position:relative;overflow:hidden;border-right:1px solid var(--stroke)}
.gmini:last-child{border-right:none}
.gmini img{width:100%;height:100%;object-fit:cover;object-position:center;transition:transform .5s ease}
.gmini:hover img{transform:scale(1.06)}
.gmini::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(9,13,24,.8))}
.gmini-lbl{position:absolute;bottom:10px;left:12px;z-index:1;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,236,228,.6)}

/* ── MOBILE SECTION ──────────────────────────── */
.mob-section{
  padding:48px 40px;border-top:1px solid var(--stroke);
  background:rgba(255,255,255,.012);
  display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:start;
}
.mob-intro{padding-top:20px}
.mob-intro-tag{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
.mob-intro h3{font-size:clamp(32px,4vw,52px);font-weight:700;letter-spacing:-.07em;line-height:.9;margin-bottom:16px}
.mob-intro p{font-size:15px;line-height:1.72;color:var(--muted);margin-bottom:26px}
.mob-snav{display:flex;gap:0;margin-bottom:28px}
.ms-btn{

        <div className="sp-bar-rows">
          {[[4,'xs',6],[8,'sm',12],[12,'md',18],[16,'lg',26],[24,'xl',38],[32,'2xl',52],[48,'3xl',72]].map(([v,n,w]) => (
            <div className="sp-bar-row" key={n}>
              <div className="sp-bar-lbl">{v}px</div>
              <div className="sp-bar-track"><div className="sp-bar-fill" style={{width:w+'%'}}/></div>
              <div className="sp-bar-lbl" style={{textAlign:'right'}}>{n}</div>
            </div>
          ))}
        </div>
      </div>
      {/* Motion */}
      <div className="sp">
        <div className="sp-lbl">Motion + microinteractions</div>
        <h3>Four keyframe behaviors.</h3>
        <div className="motion-spec">
          {[['6s','Hero float','Subtle vertical drift keeps the product alive without feeling game-like.'],
            ['1.6s','Cable shimmer','Dashed gradient motion turns the detachable cord into a fashion accessory.'],
            ['0.98s','Ghost pulse','Ripple rings visualize nearby share connections inside 10 feet.'],
            ['0.22s','Toggle snap','Spring-like easing curve for control feedback within 160ms travel.']
          ].map(([t,l,p]) => (
            <div className="mrow" key={l}>
              <div className="mtime">{t}</div>
              <div className="mdetail"><strong>{l}</strong><p>{p}</p></div>
            </div>
          ))}
        </div>
      </div>
    </div>

    {/* Flow diagram */}
    <div style={{padding:'36px 40px 0',borderTop:'1px solid var(--stroke)'}}>
      <div className="sp-lbl" style={{marginBottom:16}}>Web flow diagram</div>
      <div className="flow-canvas">
        <div className="flow-nodes">
          {[
            {n:'01',h:'Entry',p:'Social link, QR, or street poster. First impression is a selfie moment.'},
            {n:'02',h:'Story',p:'Mood collage, product intro, three core value props above the fold.'},
            {n:'03',h:'Configure',p:'Skin swap, vent, cable. Live render updates state in real time.'},
            {n:'04',h:'Drop',p:'CTA to wish-list a limited plate. Timer and scarcity drive urgency.'},
            {n:'05',h:'Ghost',p:'Nearby Aura detect. Soft share pulse. Social proof without friction.'},
          ].map(f => (
            <div className="fn" key={f.n}>
              <div className="fn-step">{f.n}</div>
              <h4>{f.h}</h4>
              <p>{f.p}</p>
            </div>
          ))}
        </div>
      </div>
    </div>

    {/* Image strip */}
    <div className="lb-strip" style={{marginTop:40,borderTop:'1px solid var(--stroke)'}}>
      {[
        {src:'closeup.webp',alt:'Closeup detail shot',lbl:'Closeup detail'},
        {src:'product-board.webp',alt:'Product system board',lbl:'Full system'},
        {src:'social-shot.webp',alt:'Social sharing moment',lbl:'Ghost Mode in use'},
      ].map(i => (
        <div className="lb-cell" key={i.src}>
          <img src={i.src} alt={i.alt}/>
          <div className="lb-lbl">{i.lbl}</div>
        </div>
      ))}
    </div>

    <div className="foot">
      <div className="foot-copy">Aura G1 · UI/UX Case Study · Debayan Mukherjee · 2026</div>
      <a href="/" className="foot-link">← Portfolio</a>
    </div>
  </div>
);

/* ═══════════════════════════════════════════════
   APP ROOT — all shared state lives here
═══════════════════════════════════════════════ */
const App = () => {
  const [screen, setScreen]           = useState('discover');
  const [plate, setPlate]             = useState('frost');
  const [vent, setVent]               = useState(62);
  const [cable, setCable]             = useState(true);
  const [detox, setDetox]             = useState(false);
  const [mood, setMood]               = useState('grounded');
  const [ghostActive, setGhostActive] = useState(false);

  const handleDetox = useCallback(v => {
    setDetox(v);
    if (v) setCable(true);
  }, []);

  /* Sync CSS variables + body attributes */
  useEffect(() => {
    document.body.dataset.plate  = plate;
    document.body.dataset.mood   = mood;
    document.body.dataset.detox  = detox ? 'true' : 'false';
    document.body.dataset.cable  = (detox || cable) ? 'true' : 'false';
    document.documentElement.style.setProperty('--vent-ratio', (vent / 100).toFixed(2));
  }, [plate, mood, detox, cable, vent]);

  /* Ghost mode auto-reset */
  useEffect(() => {
    if (!ghostActive) return;
    const t = setTimeout(() => setGhostActive(false), 2200);
    return () => clearTimeout(t);
  }, [ghostActive]);

  const sharedProps = { plate, setPlate, vent, setVent, cable, setCable, detox, handleDetox, mood, setMood, ghostActive, setGhostActive };

  return (
    <div className="app">
      <nav className="top-nav">
        <div className="nav-brand">
          <span>AURA G1</span>
        </div>
        <div className="nav-screens">
          {[['discover','01 Discover'],['prototype','02 Prototype'],['system','03 System']].map(([s,l]) => (
            <button type="button" key={s} className={`ns-btn${screen===s?' active':''}`} onClick={() => setScreen(s)}>{l}</button>
          ))}
        </div>
        <div className="nav-meta">UI/UX Case Study · 2026</div>
      </nav>

      {screen==='discover'  && <DiscoverScreen setScreen={setScreen}/>}
      {screen==='prototype' && <PrototypeSection {...sharedProps} setScreen={setScreen}/>}
      {screen==='system'    && <SystemScreen/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
